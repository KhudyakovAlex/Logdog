<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logdog UI</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #0f1a2e;
        --text: #e7eefc;
        --muted: #9bb0d0;
        --border: #213257;
        --accent: #7aa2ff;
        --error: #ff6b6b;
        --warn: #ffd166;
        --info: #55d6c2;
        --debug: #a7b7d6;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      body {
        margin: 0;
        background: radial-gradient(1200px 800px at 10% 0%, #15234a 0%, var(--bg) 45%);
        color: var(--text);
        font-family: var(--sans);
        font-size: 150%;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 14px 40px;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: baseline;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      h1 {
        font-size: 27px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      .sub {
        color: var(--muted);
        font-size: 18px;
      }
      .panel {
        background: color-mix(in srgb, var(--panel) 92%, black);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 10px;
        align-items: end;
      }
      label {
        display: block;
        font-size: 18px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0a1326;
        color: var(--text);
        outline: none;
      }
      input::placeholder { color: color-mix(in srgb, var(--muted) 75%, transparent); }
      .btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, #1c2f5d, #122245);
        color: var(--text);
        padding: 9px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button.primary {
        border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 28%, #1c2f5d), #122245);
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .grid-3 { grid-column: span 3; }
      .grid-2 { grid-column: span 2; }
      .grid-4 { grid-column: span 4; }
      .grid-6 { grid-column: span 6; }
      .grid-12 { grid-column: span 12; }
      .right { display: flex; justify-content: flex-end; }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
      }
      .check input {
        width: auto;
        margin: 0;
      }
      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 18px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }
      .table {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .thead, .trow {
        display: grid;
        grid-template-columns: 120px 78px 160px 1fr 120px;
        gap: 10px;
        align-items: start;
      }
      .thead {
        padding: 10px 12px;
        background: #0a1326;
        border-bottom: 1px solid var(--border);
        font-size: 18px;
        color: var(--muted);
      }
      .trow {
        padding: 10px 12px;
        border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
        font-size: 19.5px;
      }
      .trow:last-child { border-bottom: 0; }
      .mono { font-family: var(--mono); }
      .msg {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.35;
      }
      .msg-text {
        white-space: pre-wrap;
      }
      .attachment-list {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .attachment-link {
        padding: 5px 9px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent) 12%, #0a1326);
        border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
        color: var(--text);
        font-size: 16px;
      }
      .attachment-link:hover {
        border-color: color-mix(in srgb, var(--accent) 65%, var(--border));
      }
      .viewer-backdrop {
        position: fixed;
        inset: 0;
        background: color-mix(in srgb, black 55%, transparent);
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 20px;
        z-index: 20;
      }
      .viewer-backdrop[hidden] {
        display: none;
      }
      .viewer {
        width: min(1200px, 100%);
        height: min(92vh, 100%);
        background: color-mix(in srgb, var(--panel) 96%, black);
        border: 1px solid var(--border);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 18px 80px rgba(0, 0, 0, 0.45);
      }
      .viewer-head {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 12px;
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .viewer-title {
        font-size: 22px;
        font-weight: 700;
      }
      .viewer-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 16px;
      }
      .viewer-body {
        padding: 14px;
        overflow: auto;
        flex: 1;
        font-size: 15px;
        line-height: 1.5;
      }
      .viewer-empty {
        color: var(--muted);
      }
      .viewer-pre {
        margin: 0;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0a1326;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 15px;
        line-height: 1.45;
      }
      .json-node {
        margin-left: 12px;
        font-size: 15px;
        line-height: 1.45;
      }
      .json-node details {
        margin: 4px 0;
      }
      .json-node summary {
        cursor: pointer;
        color: var(--text);
        font-size: 15px;
      }
      .json-children {
        margin-left: 16px;
        padding-left: 10px;
        border-left: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
      }
      .json-key {
        color: var(--accent);
      }
      .json-value-string {
        color: #9fe870;
      }
      .json-value-number {
        color: #ffd166;
      }
      .json-value-bool {
        color: #7fd1ff;
      }
      .json-value-null {
        color: var(--muted);
      }
      .markdown-view {
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 17px;
        line-height: 1.6;
      }
      .markdown-section {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: color-mix(in srgb, #0a1326 92%, transparent);
      }
      .markdown-section summary {
        cursor: pointer;
        padding: 10px 12px;
        font-weight: 700;
        font-size: 17px;
      }
      .markdown-section-body {
        padding: 0 12px 12px;
        font-size: 17px;
        line-height: 1.6;
      }
      .markdown-section-body > *:first-child {
        margin-top: 0;
      }
      .markdown-section-body > *:last-child {
        margin-bottom: 0;
      }
      .markdown-view h1, .markdown-view h2, .markdown-view h3, .markdown-view h4, .markdown-view h5, .markdown-view h6 {
        margin: 18px 0 10px;
      }
      .markdown-view h1 { font-size: 28px; }
      .markdown-view h2 { font-size: 24px; }
      .markdown-view h3 { font-size: 20px; }
      .markdown-view h4, .markdown-view h5, .markdown-view h6 { font-size: 18px; }
      .markdown-view p, .markdown-view ul, .markdown-view ol, .markdown-view blockquote, .markdown-view li {
        margin: 10px 0;
        font-size: 17px;
        line-height: 1.6;
      }
      .markdown-view code {
        font-family: var(--mono);
        background: color-mix(in srgb, #0a1326 86%, transparent);
        padding: 1px 5px;
        border-radius: 6px;
        font-size: 15px;
      }
      .markdown-view pre {
        margin: 10px 0;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #081120;
        overflow: auto;
      }
      .markdown-view pre code {
        background: transparent;
        padding: 0;
        font-size: 15px;
      }
      .markdown-view blockquote {
        padding-left: 12px;
        border-left: 3px solid color-mix(in srgb, var(--accent) 45%, var(--border));
        color: color-mix(in srgb, var(--text) 90%, var(--muted));
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in srgb, #0a1326 85%, transparent);
        font-size: 18px;
        width: fit-content;
      }
      .lvl-debug { color: var(--debug); border-color: color-mix(in srgb, var(--debug) 30%, var(--border)); }
      .lvl-info { color: var(--info); border-color: color-mix(in srgb, var(--info) 30%, var(--border)); }
      .lvl-warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 30%, var(--border)); }
      .lvl-error { color: var(--error); border-color: color-mix(in srgb, var(--error) 30%, var(--border)); }
      .small { font-size: 18px; color: var(--muted); }
      .errbox {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--error) 50%, var(--border));
        background: color-mix(in srgb, var(--error) 10%, transparent);
        color: color-mix(in srgb, var(--text) 92%, white);
        display: none;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      @media (max-width: 920px) {
        .thead, .trow { grid-template-columns: 120px 78px 1fr; }
        .col-app, .col-trace { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Logdog UI</h1>
          <div class="sub">Просмотр логов и вложений из SQLite через HTTP API: <span class="mono">/api/recent</span>, <span class="mono">/api/query</span>, <span class="mono">/api/attachments/{id}</span></div>
        </div>
        <div class="sub">Ingest: <span class="mono">POST /logs</span></div>
      </header>

      <div class="panel">
        <div class="controls">
          <div class="grid-3">
            <label>App</label>
            <select id="app">
              <option value="">(any)</option>
            </select>
          </div>
          <div class="grid-2">
            <label>Level</label>
            <select id="level">
              <option value="">(any)</option>
              <option value="debug">debug</option>
              <option value="info">info</option>
              <option value="warn">warn</option>
              <option value="error">error</option>
            </select>
          </div>
          <div class="grid-4">
            <label>Contains</label>
            <input id="contains" placeholder="подстрока в message / attachment" />
          </div>
          <div class="grid-3">
            <label>TraceId</label>
            <input id="traceId" placeholder="trace id" />
          </div>
          <div class="grid-3">
            <label>Since (ISO/datetime-local)</label>
            <input id="since" type="datetime-local" />
          </div>
          <div class="grid-3">
            <label>Until (ISO/datetime-local)</label>
            <input id="until" type="datetime-local" />
          </div>
          <div class="grid-2">
            <label>Limit</label>
            <input id="limit" type="number" min="1" max="5000" value="200" />
          </div>
          <div class="grid-4">
            <label>Auto refresh</label>
            <div class="row">
              <select id="autoEvery">
                <option value="0">off</option>
                <option value="1000">1s</option>
                <option value="2000" selected>2s</option>
                <option value="5000">5s</option>
                <option value="10000">10s</option>
              </select>
              <label class="small"><input id="useQuery" type="checkbox" /> использовать query (иначе recent)</label>
            </div>
          </div>
          <div class="grid-4">
            <label>Отображение</label>
            <div class="row">
              <label class="check"><input id="showSystemInfo" type="checkbox" /> Показывать системную информацию</label>
            </div>
          </div>
          <div class="grid-12 right">
            <div class="btns">
              <button class="primary" id="btnLoad">Load</button>
              <button id="btnClear">Clear</button>
              <button id="btnCopyLink" title="Скопировать URL с параметрами">Copy link</button>
            </div>
          </div>
        </div>
        <div class="errbox" id="errbox"></div>
        <div class="meta">
          <div id="status">—</div>
          <div class="mono">tip: <a href="/docs" target="_blank" rel="noreferrer">/docs</a></div>
        </div>
      </div>

      <div class="table" id="table">
        <div class="thead">
          <div>Time</div>
          <div>Level</div>
          <div class="col-app">App</div>
          <div>Message</div>
          <div class="col-trace">Trace</div>
        </div>
        <div id="rows"></div>
      </div>

      <div class="viewer-backdrop" id="viewerBackdrop" hidden>
        <div class="viewer">
          <div class="viewer-head">
            <div>
              <div class="viewer-title" id="viewerTitle">Attachment</div>
              <div class="viewer-meta mono" id="viewerMeta"></div>
            </div>
            <div class="btns">
              <button class="primary" id="viewerFormattedBtn">Formatted</button>
              <button id="viewerRawBtn">Raw</button>
              <button id="viewerCloseBtn">Close</button>
            </div>
          </div>
          <div class="viewer-body" id="viewerBody"></div>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const state = {
        timer: null,
        lastCount: 0,
        lastLoadAt: 0,
        rows: [],
        attachmentCache: new Map(),
        currentAttachment: null,
        viewerMode: "formatted",
      };

      function toMsFromDateTimeLocal(v) {
        if (!v) return null;
        const dt = new Date(v);
        if (isNaN(dt.getTime())) return null;
        return dt.getTime();
      }

      function fmtTs(ms) {
        const d = new Date(ms);
        if (isNaN(d.getTime())) return String(ms);
        const pad = (n) => String(n).padStart(2, "0");
        const pad3 = (n) => String(n).padStart(3, "0");
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad3(d.getMilliseconds())}`;
      }

      function fmtBytes(n) {
        const v = Number(n);
        if (!Number.isFinite(v) || v < 0) return "0 B";
        if (v < 1024) return `${v} B`;
        if (v < 1024 * 1024) return `${(v / 1024).toFixed(1)} KB`;
        return `${(v / (1024 * 1024)).toFixed(2)} MB`;
      }

      function lvlClass(lvl) {
        return `pill mono lvl-${String(lvl || "debug")}`;
      }

      function chatWho(r) {
        const f = (r && r.fields) ? r.fields : null;
        const raw = f ? (f.role ?? f.speaker ?? f.from ?? null) : null;
        if (!raw) return null;
        const v = String(raw).trim().toLowerCase();
        if (v === "user" || v === "human") return "USER";
        if (v === "assistant" || v === "ai" || v === "llm") return "LLM";
        return null;
      }

      function chatText(r) {
        const f = (r && r.fields) ? r.fields : null;
        const t = f ? (f.text ?? f.content ?? f.prompt ?? f.response ?? null) : null;
        if (t == null) return null;
        const s = String(t);
        return s.trim() ? s : null;
      }

      function showSystemInfoEnabled() {
        return $("showSystemInfo").checked;
      }

      function showError(msg) {
        const box = $("errbox");
        box.textContent = msg;
        box.style.display = msg ? "block" : "none";
      }

      function paramsFromUI() {
        const limit = parseInt($("limit").value || "200", 10);
        const app = $("app").value.trim();
        const level = $("level").value.trim();
        const contains = $("contains").value.trim();
        const traceId = $("traceId").value.trim();
        const since = toMsFromDateTimeLocal($("since").value);
        const until = toMsFromDateTimeLocal($("until").value);
        return {
          limit: isFinite(limit) ? Math.max(1, Math.min(5000, limit)) : 200,
          app: app || null,
          level: level || null,
          contains: contains || null,
          traceId: traceId || null,
          since: since,
          until: until,
        };
      }

      function setUIFromParams(urlParams) {
        if (urlParams.has("app")) $("app").value = urlParams.get("app") || "";
        if (urlParams.has("level")) $("level").value = urlParams.get("level") || "";
        if (urlParams.has("contains")) $("contains").value = urlParams.get("contains") || "";
        if (urlParams.has("traceId")) $("traceId").value = urlParams.get("traceId") || "";
        if (urlParams.has("limit")) $("limit").value = urlParams.get("limit") || "200";
        if (urlParams.has("sinceIso")) $("since").value = urlParams.get("sinceIso") || "";
        if (urlParams.has("untilIso")) $("until").value = urlParams.get("untilIso") || "";
        if (urlParams.has("autoEvery")) $("autoEvery").value = urlParams.get("autoEvery") || "0";
        if (urlParams.has("useQuery")) $("useQuery").checked = (urlParams.get("useQuery") === "1");
        if (urlParams.has("showSystemInfo")) $("showSystemInfo").checked = (urlParams.get("showSystemInfo") === "1");
      }

      async function loadApps() {
        try {
          const wanted = $("app").value || "";
          const res = await fetch("/api/apps?limit=2000", { headers: { "Accept": "application/json" } });
          if (!res.ok) return;
          const data = await res.json();
          if (!Array.isArray(data)) return;

          const sel = $("app");
          const anyOpt = sel.querySelector("option[value='']");
          sel.innerHTML = "";
          sel.appendChild(anyOpt || new Option("(any)", ""));

          for (const it of data) {
            const name = (it && it.app) ? String(it.app) : "";
            if (!name) continue;
            const cnt = (it && Number.isFinite(it.count)) ? it.count : null;
            const label = (cnt != null) ? `${name} (${cnt})` : name;
            const opt = new Option(label, name);
            sel.appendChild(opt);
          }

          sel.value = wanted;
          if (wanted && sel.value !== wanted) sel.value = "";
        } catch (_) {
          // ignore
        }
      }

      function buildApiUrl() {
        const p = paramsFromUI();
        const useQuery = $("useQuery").checked;
        const sp = new URLSearchParams();
        sp.set("limit", String(p.limit));
        if (p.app) sp.set("app", p.app);
        if (p.level) sp.set("level", p.level);
        if (useQuery) {
          if (p.contains) sp.set("contains", p.contains);
          if (p.traceId) sp.set("traceId", p.traceId);
          if (p.since != null) sp.set("since", String(p.since));
          if (p.until != null) sp.set("until", String(p.until));
          return "/api/query?" + sp.toString();
        }
        return "/api/recent?" + sp.toString();
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#039;");
      }

      function updateViewerButtons() {
        $("viewerFormattedBtn").disabled = state.viewerMode === "formatted";
        $("viewerRawBtn").disabled = state.viewerMode === "raw";
      }

      function closeViewer() {
        $("viewerBackdrop").hidden = true;
        $("viewerBody").innerHTML = "";
        $("viewerMeta").textContent = "";
        state.currentAttachment = null;
      }

      function setViewerLoading(title, meta) {
        $("viewerBackdrop").hidden = false;
        $("viewerTitle").textContent = title;
        $("viewerMeta").textContent = meta || "";
        $("viewerBody").innerHTML = "";
        const msg = document.createElement("div");
        msg.className = "viewer-empty";
        msg.textContent = "loading...";
        $("viewerBody").appendChild(msg);
      }

      function setViewerMode(mode) {
        state.viewerMode = mode === "raw" ? "raw" : "formatted";
        updateViewerButtons();
        renderCurrentAttachment();
      }

      async function openAttachment(id) {
        const attachmentId = parseInt(String(id), 10);
        if (!Number.isFinite(attachmentId) || attachmentId <= 0) return;

        state.viewerMode = "formatted";
        updateViewerButtons();

        const cached = state.attachmentCache.get(attachmentId);
        if (cached) {
          state.currentAttachment = cached;
          $("viewerBackdrop").hidden = false;
          renderCurrentAttachment();
          return;
        }

        setViewerLoading("Attachment", `#${attachmentId}`);
        try {
          const res = await fetch(`/api/attachments/${attachmentId}`, { headers: { "Accept": "application/json" } });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(`HTTP ${res.status}: ${txt.slice(0, 300)}`);
          }
          const data = await res.json();
          state.attachmentCache.set(attachmentId, data);
          state.currentAttachment = data;
          renderCurrentAttachment();
        } catch (e) {
          $("viewerBody").innerHTML = "";
          const msg = document.createElement("div");
          msg.className = "viewer-empty";
          msg.textContent = String(e && e.message ? e.message : e);
          $("viewerBody").appendChild(msg);
        }
      }

      function renderCurrentAttachment() {
        const att = state.currentAttachment;
        if (!att) return;

        $("viewerBackdrop").hidden = false;
        $("viewerTitle").textContent = att.name || `Attachment #${att.id}`;
        $("viewerMeta").textContent = `${String(att.kind || "").toUpperCase()}  ${fmtBytes(att.sizeBytes)}  log:${att.logId}`;
        updateViewerButtons();

        const body = $("viewerBody");
        body.innerHTML = "";

        if (state.viewerMode === "raw") {
          const pre = document.createElement("pre");
          pre.className = "viewer-pre mono";
          pre.textContent = String(att.content || "");
          body.appendChild(pre);
          return;
        }

        if (att.kind === "json") {
          body.appendChild(renderJsonAttachment(att));
          return;
        }

        body.appendChild(renderMarkdownAttachment(att));
      }

      function renderJsonAttachment(att) {
        try {
          const parsed = JSON.parse(String(att.content || ""));
          const root = document.createElement("div");
          root.className = "json-node mono";
          root.appendChild(renderJsonNode(parsed, null, 0));
          return root;
        } catch (e) {
          const wrap = document.createElement("div");
          const msg = document.createElement("div");
          msg.className = "viewer-empty";
          msg.textContent = `failed to parse json: ${String(e && e.message ? e.message : e)}`;
          wrap.appendChild(msg);
          const pre = document.createElement("pre");
          pre.className = "viewer-pre mono";
          pre.textContent = String(att.content || "");
          wrap.appendChild(pre);
          return wrap;
        }
      }

      function renderJsonNode(value, key, depth) {
        const isObject = value !== null && typeof value === "object";
        const node = document.createElement("div");
        node.className = "json-node";

        if (!isObject) {
          const line = document.createElement("div");
          if (key != null) {
            const keyEl = document.createElement("span");
            keyEl.className = "json-key";
            keyEl.textContent = `${key}: `;
            line.appendChild(keyEl);
          }
          const valueEl = document.createElement("span");
          if (typeof value === "string") {
            valueEl.className = "json-value-string";
            valueEl.textContent = `"${value}"`;
          } else if (typeof value === "number") {
            valueEl.className = "json-value-number";
            valueEl.textContent = String(value);
          } else if (typeof value === "boolean") {
            valueEl.className = "json-value-bool";
            valueEl.textContent = String(value);
          } else {
            valueEl.className = "json-value-null";
            valueEl.textContent = "null";
          }
          line.appendChild(valueEl);
          node.appendChild(line);
          return node;
        }

        const isArray = Array.isArray(value);
        const entries = isArray ? value.map((item, index) => [index, item]) : Object.entries(value);
        const details = document.createElement("details");
        details.open = depth < 1;

        const summary = document.createElement("summary");
        const label = [];
        if (key != null) label.push(`${key}: `);
        label.push(isArray ? `Array(${entries.length})` : `Object(${entries.length})`);
        summary.textContent = label.join("");
        details.appendChild(summary);

        const children = document.createElement("div");
        children.className = "json-children";
        if (!entries.length) {
          const empty = document.createElement("div");
          empty.className = "json-value-null";
          empty.textContent = isArray ? "[]" : "{}";
          children.appendChild(empty);
        } else {
          for (const [childKey, childValue] of entries) {
            children.appendChild(renderJsonNode(childValue, childKey, depth + 1));
          }
        }
        details.appendChild(children);
        node.appendChild(details);
        return node;
      }

      function renderMarkdownAttachment(att) {
        const markdown = String(att.content || "");
        const root = document.createElement("div");
        root.className = "markdown-view";

        for (const section of splitMarkdownSections(markdown)) {
          const details = document.createElement("details");
          details.className = "markdown-section";
          details.open = section.index === 0;

          const summary = document.createElement("summary");
          summary.textContent = section.title;
          details.appendChild(summary);

          const body = document.createElement("div");
          body.className = "markdown-section-body";
          body.appendChild(renderMarkdownBlocks(section.lines));
          details.appendChild(body);
          root.appendChild(details);
        }

        return root;
      }

      function splitMarkdownSections(markdown) {
        const lines = String(markdown || "").split(/\r?\n/);
        const sections = [];
        let current = null;

        function pushCurrent() {
          if (current && current.lines.length) {
            current.index = sections.length;
            sections.push(current);
          }
        }

        for (const line of lines) {
          const m = line.match(/^(#{1,6})\s+(.+?)\s*$/);
          if (m) {
            pushCurrent();
            current = { title: m[2].trim(), lines: [] };
            continue;
          }
          if (!current) current = { title: "Document", lines: [] };
          current.lines.push(line);
        }
        pushCurrent();

        if (!sections.length) {
          sections.push({ index: 0, title: "Document", lines: lines });
        }
        return sections;
      }

      function renderMarkdownBlocks(lines) {
        const root = document.createDocumentFragment();
        const all = Array.isArray(lines) ? lines : [];
        let i = 0;

        function appendParagraph(parts) {
          const p = document.createElement("p");
          p.innerHTML = parts.map((part) => renderInlineMarkdown(part)).join("<br>");
          root.appendChild(p);
        }

        while (i < all.length) {
          const line = all[i];

          if (!line.trim()) {
            i += 1;
            continue;
          }

          if (/^```/.test(line)) {
            i += 1;
            const block = [];
            while (i < all.length && !/^```/.test(all[i])) {
              block.push(all[i]);
              i += 1;
            }
            if (i < all.length) i += 1;
            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.className = "mono";
            code.textContent = block.join("\n");
            pre.appendChild(code);
            root.appendChild(pre);
            continue;
          }

          if (/^\s*>\s?/.test(line)) {
            const quoteLines = [];
            while (i < all.length && /^\s*>\s?/.test(all[i])) {
              quoteLines.push(all[i].replace(/^\s*>\s?/, ""));
              i += 1;
            }
            const blockquote = document.createElement("blockquote");
            blockquote.innerHTML = quoteLines.map((part) => renderInlineMarkdown(part)).join("<br>");
            root.appendChild(blockquote);
            continue;
          }

          if (/^\s*[-*]\s+/.test(line)) {
            const ul = document.createElement("ul");
            while (i < all.length && /^\s*[-*]\s+/.test(all[i])) {
              const li = document.createElement("li");
              li.innerHTML = renderInlineMarkdown(all[i].replace(/^\s*[-*]\s+/, ""));
              ul.appendChild(li);
              i += 1;
            }
            root.appendChild(ul);
            continue;
          }

          if (/^\s*\d+\.\s+/.test(line)) {
            const ol = document.createElement("ol");
            while (i < all.length && /^\s*\d+\.\s+/.test(all[i])) {
              const li = document.createElement("li");
              li.innerHTML = renderInlineMarkdown(all[i].replace(/^\s*\d+\.\s+/, ""));
              ol.appendChild(li);
              i += 1;
            }
            root.appendChild(ol);
            continue;
          }

          const paragraph = [];
          while (
            i < all.length &&
            all[i].trim() &&
            !/^```/.test(all[i]) &&
            !/^\s*>\s?/.test(all[i]) &&
            !/^\s*[-*]\s+/.test(all[i]) &&
            !/^\s*\d+\.\s+/.test(all[i])
          ) {
            paragraph.push(all[i]);
            i += 1;
          }
          appendParagraph(paragraph);
        }

        const wrap = document.createElement("div");
        wrap.appendChild(root);
        return wrap;
      }

      function renderInlineMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, (_m, label, href) => {
          return `<a href="${escapeHtml(href)}" target="_blank" rel="noreferrer">${label}</a>`;
        });
        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        return html;
      }

      function render(rows) {
        const root = $("rows");
        root.innerHTML = "";

        for (const r of rows) {
          const lvl = String(r.level || "debug");
          const trace = r.traceId || "";
          const who = chatWho(r);
          const chat = who ? (chatText(r) || r.message) : null;
          const fields = (showSystemInfoEnabled() && !who && r.fields) ? JSON.stringify(r.fields) : "";
          const msg = who ? (`${who}:\n${chat}`) : (r.message + (fields ? "\n" + fields : ""));
          const attachments = Array.isArray(r.attachments) ? r.attachments : [];

          const row = document.createElement("div");
          row.className = "trow";

          const timeEl = document.createElement("div");
          timeEl.className = "mono";
          timeEl.textContent = fmtTs(r.ts);

          const levelEl = document.createElement("div");
          const levelPill = document.createElement("span");
          levelPill.className = lvlClass(lvl);
          levelPill.textContent = lvl;
          levelEl.appendChild(levelPill);

          const appEl = document.createElement("div");
          appEl.className = "col-app mono";
          appEl.textContent = String(r.app || "");

          const msgEl = document.createElement("div");
          msgEl.className = "msg";
          const msgTextEl = document.createElement("div");
          msgTextEl.className = "msg-text";
          msgTextEl.textContent = msg || "";
          msgEl.appendChild(msgTextEl);

          if (attachments.length) {
            const list = document.createElement("div");
            list.className = "attachment-list";
            for (const a of attachments) {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = "attachment-link mono";
              btn.textContent = `${String(a.name || "attachment")} [${String(a.kind || "").toUpperCase()} ${fmtBytes(a.sizeBytes)}]`;
              btn.addEventListener("click", () => openAttachment(a.id));
              list.appendChild(btn);
            }
            msgEl.appendChild(list);
          }

          const traceEl = document.createElement("div");
          traceEl.className = "col-trace mono";
          traceEl.textContent = trace;

          row.appendChild(timeEl);
          row.appendChild(levelEl);
          row.appendChild(appEl);
          row.appendChild(msgEl);
          row.appendChild(traceEl);
          root.appendChild(row);
        }
      }

      async function loadOnce() {
        const url = buildApiUrl();
        $("btnLoad").disabled = true;
        showError("");
        const started = performance.now();
        try {
          const res = await fetch(url, { headers: { "Accept": "application/json" } });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(`HTTP ${res.status}: ${txt.slice(0, 300)}`);
          }
          const data = await res.json();
          state.rows = Array.isArray(data) ? data : [];
          render(state.rows);
          state.lastCount = state.rows.length;
          state.lastLoadAt = Date.now();
          const ms = Math.round(performance.now() - started);
          $("status").textContent = `loaded ${state.lastCount} rows in ${ms}ms via ${url}`;
        } catch (e) {
          showError(String(e && e.message ? e.message : e));
          $("status").textContent = "load failed";
        } finally {
          $("btnLoad").disabled = false;
        }
      }

      async function purgeLogs() {
        $("btnClear").disabled = true;
        showError("");
        try {
          const res = await fetch("/api/purge", { method: "POST" });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(`HTTP ${res.status}: ${txt.slice(0, 300)}`);
          }
          const data = await res.json().catch(() => ({}));
          const deleted = (data && Number.isFinite(data.deleted)) ? data.deleted : null;
          state.rows = [];
          state.attachmentCache.clear();
          $("rows").innerHTML = "";
          closeViewer();
          await loadApps();
          $("status").textContent = deleted != null ? `purged ${deleted} rows` : "purged";
        } catch (e) {
          showError(String(e && e.message ? e.message : e));
          $("status").textContent = "purge failed";
        } finally {
          $("btnClear").disabled = false;
        }
      }

      function updateAuto() {
        if (state.timer) {
          clearInterval(state.timer);
          state.timer = null;
        }
        const every = parseInt($("autoEvery").value || "0", 10);
        if (every > 0) {
          state.timer = setInterval(loadOnce, every);
        }
      }

      function copyLink() {
        const p = paramsFromUI();
        const sp = new URLSearchParams();
        if (p.app) sp.set("app", p.app);
        if (p.level) sp.set("level", p.level);
        if (p.contains) sp.set("contains", p.contains);
        if (p.traceId) sp.set("traceId", p.traceId);
        sp.set("limit", String(p.limit));
        if ($("since").value) sp.set("sinceIso", $("since").value);
        if ($("until").value) sp.set("untilIso", $("until").value);
        sp.set("autoEvery", $("autoEvery").value);
        sp.set("useQuery", $("useQuery").checked ? "1" : "0");
        sp.set("showSystemInfo", $("showSystemInfo").checked ? "1" : "0");
        const url = location.origin + location.pathname + "?" + sp.toString();
        navigator.clipboard.writeText(url).then(
          () => { $("status").textContent = "copied link to clipboard"; },
          () => { $("status").textContent = "failed to copy"; }
        );
      }

      $("btnLoad").addEventListener("click", loadOnce);
      $("btnClear").addEventListener("click", purgeLogs);
      $("btnCopyLink").addEventListener("click", copyLink);
      $("autoEvery").addEventListener("change", updateAuto);
      $("showSystemInfo").addEventListener("change", () => render(state.rows));
      $("viewerCloseBtn").addEventListener("click", closeViewer);
      $("viewerFormattedBtn").addEventListener("click", () => setViewerMode("formatted"));
      $("viewerRawBtn").addEventListener("click", () => setViewerMode("raw"));
      $("viewerBackdrop").addEventListener("click", (e) => {
        if (e.target === $("viewerBackdrop")) closeViewer();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !$("viewerBackdrop").hidden) closeViewer();
      });

      setUIFromParams(new URLSearchParams(location.search));
      updateViewerButtons();
      loadApps();
      updateAuto();
      loadOnce();
    </script>
  </body>
</html>
